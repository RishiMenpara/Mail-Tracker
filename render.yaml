databases:
  - name: mailtrackr-db
    plan: free
    databaseName: mailtrackr
    user: mailtrackr

services:
  - type: web
    name: mailtrackr-api
    plan: free
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mailtrackr-db
          property: connectionString
